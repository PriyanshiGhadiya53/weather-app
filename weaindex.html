<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>
    <link rel="stylesheet" href="weacss.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    </link>
</head>
<body>
    <div class="container">
    <i class="fa-solid fa-cloud"></i>
    <h1 >Weather App</h1>
</div>

    
        <div class="box">
                  <i id="loc" class="fa-solid fa-location-dot"></i>
                  <input type="text" id="input" placeholder="Enter the Location">
                   <button id="search-btn">
                 <i class="fa-sharp fa-solid fa-magnifying-glass"></i>
                   </button>
        </div>
        
                <div class="temp">
                    <img src="img.png">
                    
                    <div class="temp-show"></div>
                </div>
              <div class="card">
               
                <div class="hum">
                    <i class="fa-solid fa-tint"></i>
                    <p class="label">Humidity</p>
                   <p class="value"></p>
                </div>
                 <div class="vis">
                    <i class="fa-solid fa-eye"></i>
                    <p class="label">Visibility</p>
                    <p class="value"></p>
                </div>
                <div class="wind">
                    <i class="fa-solid fa-wind"></i>
                    <p class="label">Wind</p>
                    <p class="value"></p>
                </div>
                 <div class="Pressure">
                    <i class="fa-solid fa-up-down"></i>
                    <p class="label">Pressure</p>
                    <p class="value"></p>
                </div>
               
              </div>
    
     <footer>

        <div class="left"> @ 2026 Weather App</div>
        <div class="center">Made with &#10084;&#65039; by priyanshi</div>

        <div class="right">
            <i class="fa-solid fa-phone"></i>
            <a href="tel:+918849301601">+918849301601</a>
            <i class="fa-brands fa-whatsapp"></i>
            <a href="https://wa.me/918849301601" target="_blank">WhatApp</a>
        </div>
    </footer>



    <script src="weajs.js"></script>
</body>
</html>
